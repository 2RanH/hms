{% extends "base.html" %}

{% block content %}

<h2>Patients</h2>

<div class="card">
    <form method="get">
        <input
            type="text"
            name="q"
            value="{{ request.query_params.get('q','') }}"
            placeholder="Search patient by name"
        >
        <button type="submit">Search</button>
    </form>
</div>

<div class="card">
    <div class="card-title">Patient Directory</div>

    <table width="100%" cellpadding="8">
        <tr class="muted">
            <th>ID</th>
            <th>Patient</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>

        {% for p in patients %}
        <tr>
            <td>{{ p.id }}</td>
            <td><strong>{{ p.name }} {{ p.surname }}</strong></td>
            <td>{{ p.phone }}</td>
            <td>
                <a href="/ui/doctor/patients/{{ p.id }}">
                    Open Medical Card
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<a href="/admin">← Back to Admin</a>

{% endblock %}
